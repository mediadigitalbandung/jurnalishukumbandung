name: Debug VPS

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['.github/workflows/debug.yml']

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS status
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.15.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== PM2 Status ==="
            pm2 list
            echo ""
            echo "=== PM2 Logs (last 20 lines) ==="
            pm2 logs jhb --lines 20 --nostream
            echo ""
            echo "=== Nginx Status ==="
            systemctl status nginx --no-pager -l | head -20
            echo ""
            echo "=== Nginx JHB Config ==="
            cat /etc/nginx/sites-enabled/*jhb* 2>/dev/null || cat /etc/nginx/sites-enabled/default 2>/dev/null | head -50
            echo ""
            echo "=== Test localhost ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:3001 2>&1
            echo ""
            echo "=== Nginx Error Log ==="
            tail -10 /var/log/nginx/error.log 2>/dev/null
