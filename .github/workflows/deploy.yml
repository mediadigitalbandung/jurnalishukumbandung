name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.15.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /var/www/jhb
            git pull origin master
            npm install

            # Migrasi role lama ke baru SEBELUM schema push (pakai raw SQL via prisma)
            node -e "
            const { PrismaClient } = require('@prisma/client');
            const p = new PrismaClient();
            (async () => {
              try {
                await p.\$executeRawUnsafe(\"UPDATE users SET role = 'EDITOR' WHERE role = 'CHIEF_EDITOR'\");
                await p.\$executeRawUnsafe(\"UPDATE users SET role = 'JOURNALIST' WHERE role = 'SENIOR_JOURNALIST'\");
                console.log('Role migration done');
              } catch(e) { console.log('Migration note:', e.message); }
              await p.\$disconnect();
            })();
            " || true

            npx prisma db push --accept-data-loss
            rm -rf .next node_modules/.cache

            # Ensure uploads directory exists and is writable
            mkdir -p public/uploads
            chmod -R 755 public/uploads

            npx next build || { echo "Build failed, retrying..."; rm -rf .next; npx next build; }
            pm2 restart jhb
            sleep 5
            curl -s -o /dev/null -w "Status: HTTP %{http_code}" http://localhost:3001
            echo ""

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || echo "Cloudflare purge skipped"
