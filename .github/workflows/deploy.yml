name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.15.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/jhb
            git pull origin master
            npm install
            npm run build
            pm2 restart jhb
