name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.15.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /var/www/jhb
            git pull origin master
            npm install

            # Migrasi role lama ke baru sebelum schema push
            node -e "
            const { Pool } = require('pg');
            const pool = new Pool({ connectionString: process.env.DATABASE_URL });
            (async () => {
              await pool.query(\"UPDATE users SET role = 'EDITOR' WHERE role = 'CHIEF_EDITOR'\");
              await pool.query(\"UPDATE users SET role = 'JOURNALIST' WHERE role = 'SENIOR_JOURNALIST'\");
              console.log('Role migration done');
              await pool.end();
            })().catch(e => console.log('Role migration skipped:', e.message));
            " || true

            npx prisma db push --accept-data-loss
            rm -rf .next node_modules/.cache
            npx next build || { echo "Build failed, retrying..."; rm -rf .next; npx next build; }
            pm2 restart jhb
            sleep 5
            curl -s -o /dev/null -w "Status: HTTP %{http_code}" http://localhost:3001
            echo ""
