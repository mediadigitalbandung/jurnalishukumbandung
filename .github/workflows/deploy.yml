name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 145.79.15.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /var/www/jhb
            git pull origin master
            npm install
            rm -rf .next
            npm run build
            pm2 restart jhb
            sleep 3
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:3001 || echo "App not ready yet"
