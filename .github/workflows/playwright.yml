name: Playwright E2E + Performance

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override base URL (default: production)"
        required: false
        default: "https://jurnalishukumbandung.com"

jobs:
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests against production
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://jurnalishukumbandung.com' }}
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  performance:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip on PRs to save runtime; only run on push to master + manual dispatch
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Install Chrome (Lighthouse needs browser)
        run: npx playwright install chromium --with-deps
      - name: Run Lighthouse audit
        env:
          PERF_BASE_URL: ${{ github.event.inputs.base_url || 'https://jurnalishukumbandung.com' }}
        run: npm run test:perf
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: tests/perf/reports/
          retention-days: 14
