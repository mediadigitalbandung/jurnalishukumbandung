<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111213"/>
      <stop offset="100%" style="stop-color:#142016"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AA13"/>
      <stop offset="100%" style="stop-color:#008C10"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00CC16"/>
      <stop offset="100%" style="stop-color:#008C10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" rx="8" fill="url(#sbg)"/>
  <rect x="0" y="0" width="300" height="3" rx="8" fill="#00AA13"/>

  <!-- Logo circle -->
  <circle cx="150" cy="48" r="28" fill="url(#logo-bg)" stroke="#FFD700" stroke-width="1.5"/>

  <!-- Scales icon simplified -->
  <g transform="translate(150,48)" fill="#FFD700" stroke="#FFD700" stroke-width="0.5">
    <!-- pillar -->
    <rect x="-1.2" y="-10" width="2.4" height="20" rx="1"/>
    <!-- base -->
    <rect x="-8" y="9" width="16" height="2.5" rx="1"/>
    <!-- beam -->
    <rect x="-14" y="-11" width="28" height="2" rx="1"/>
    <!-- left pan -->
    <path d="M-14,-9 L-18,-1 L-10,-1 Z" fill="none" stroke="#FFD700" stroke-width="1"/>
    <!-- right pan -->
    <path d="M14,-9 L10,-1 L18,-1 Z" fill="none" stroke="#FFD700" stroke-width="1"/>
    <!-- chains -->
    <line x1="-14" y1="-9" x2="-14" y2="-3" stroke-width="0.8"/>
    <line x1="14" y1="-9" x2="14" y2="-3" stroke-width="0.8"/>
  </g>

  <!-- JHB text in logo -->
  <text x="150" y="55" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" font-weight="bold" fill="#FFFFFF" letter-spacing="0.5">JHB</text>

  <!-- Ring text -->
  <text x="150" y="27" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="4.5" font-weight="bold" fill="#FFFFFF" letter-spacing="1">JURNALIS HUKUM BANDUNG</text>

  <!-- Brand name -->
  <text x="150" y="92" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Jurnalis Hukum</text>
  <text x="150" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="#00CC16">Bandung</text>

  <!-- Tagline -->
  <text x="150" y="126" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Iklankan Bisnis Hukum Anda</text>

  <!-- Sub text -->
  <text x="150" y="140" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="6.5" fill="#999999">Pidana · Perdata · Tata Negara · HAM</text>

  <!-- CTA Button -->
  <rect x="75" y="152" width="150" height="32" rx="16" fill="url(#btn)"/>
  <text x="150" y="172" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Hubungi Kami →</text>
</svg>
