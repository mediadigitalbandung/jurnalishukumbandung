<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1210"/>
      <stop offset="100%" style="stop-color:#121a14"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AA13"/>
      <stop offset="100%" style="stop-color:#008C10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" rx="10" fill="url(#sbg)"/>
  <!-- Top accent bar -->
  <rect width="300" height="2.5" rx="10" fill="#00AA13"/>

  <!-- Logo (actual PNG) -->
  <image href="/logo-jhb.png" x="120" y="10" width="60" height="60"/>

  <!-- Brand name -->
  <text x="150" y="88" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Jurnalis Hukum</text>
  <text x="150" y="106" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#00CC16">Bandung</text>

  <!-- Tagline -->
  <text x="150" y="126" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="600" fill="#FFFFFF" opacity="0.9">Iklankan Bisnis Hukum Anda</text>

  <!-- Sub categories -->
  <text x="150" y="141" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="6.5" fill="#888888" letter-spacing="0.3">Pidana  ·  Perdata  ·  Tata Negara  ·  HAM</text>

  <!-- CTA Button -->
  <rect x="70" y="154" width="160" height="34" rx="17" fill="url(#btn)"/>
  <text x="150" y="175.5" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Hubungi Kami  &#x2192;</text>
</svg>
